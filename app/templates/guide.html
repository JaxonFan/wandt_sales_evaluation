{% extends "base.html" %}{% block body %}
<div class="card" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
  <h2 style="margin:0">{{ 'How your bonus works' if lang=='en' else '你的奖金是怎么算的' }}</h2>
  <span class="hint" style="margin:0;flex:1">{{ 'A plain-language guide for the team.' if lang=='en' else '给团队的大白话说明。' }}</span>
  <span style="white-space:nowrap">
    <a class="pnav {{ 'dis' if lang=='en' }}" href="/guide?lang=en">EN</a>
    <a class="pnav {{ 'dis' if lang=='zh' }}" href="/guide?lang=zh">中文</a>
  </span>
</div>

<div class="card guide-body">{{ body|safe }}</div>

<style>
  .guide-body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans CJK SC",Roboto,Arial,sans-serif;
    line-height:1.65;font-size:14.5px;color:var(--ink);max-width:760px}
  .guide-body h1{font-size:21px;margin:2px 0 14px}
  .guide-body h2{font-size:16px;margin:24px 0 8px;padding-top:14px;border-top:1px solid var(--line)}
  .guide-body h2:first-of-type{border-top:0;padding-top:0}
  .guide-body ul{padding-left:20px} .guide-body li{margin:5px 0}
  .guide-body blockquote{margin:12px 0;padding:12px 16px;background:var(--blue-bg);border-left:4px solid var(--blue);border-radius:0 8px 8px 0}
  .guide-body blockquote p{margin:0}
  .guide-body strong{color:#0f1e30}
  .guide-body code{background:#eef2f6;padding:1px 5px;border-radius:4px;font-size:13px}
</style>
{% endblock %}
