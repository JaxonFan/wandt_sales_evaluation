{% extends "base.html" %}{% block body %}
<div class="card" style="max-width:440px;margin:60px auto">
  <h2>登录 · W&T Sales Scorecard</h2>
  <p class="hint">销售 / 经理登录　·　Sign in</p>
  {% if error %}<p class="neg">用户名或密码错误　·　{{ error }}</p>{% endif %}
  <form method="post" action="/login">
    <p><input name="username" placeholder="用户名　username" style="width:100%" required></p>
    <p><input name="password" type="password" placeholder="密码　password" style="width:100%" required></p>
    <button type="submit" style="width:100%">登录　Sign in</button>
  </form>
</div>
{% endblock %}
